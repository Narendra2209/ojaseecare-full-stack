services:
  - type: web
    name: ojasee-care-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: ojasee_care
      - key: FRONTEND_URL
        sync: false
